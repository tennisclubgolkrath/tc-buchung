<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platzbuchung - TC Schwarz-Weiss Golkrath e.V.</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════ Loading Bar ══════ -->
<div id="loadingBar" class="loading-bar" style="width:0"></div>

<!-- ══════ Toast Container ══════ -->
<div id="toastContainer" class="toast-container"></div>

<!-- ══════ AUTH VIEW ══════ -->
<div id="authView" class="auth-wrapper" style="display:none">
    <div class="auth-card">
        <div class="auth-header">
            <h1>TC Schwarz-Weiss Golkrath</h1>
            <p>Platzbuchungssystem</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Anmelden</button>
            <button class="auth-tab" data-tab="register">Registrieren</button>
        </div>

        <!-- Social Login -->
        <div class="social-auth">
            <button class="btn btn-social btn-google btn-full" id="btnGoogle">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.002 24.002 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Mit Google anmelden
            </button>

        </div>

        <div class="auth-divider">
            <span>oder</span>
        </div>

        <!-- Login -->
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginEmail">E-Mail</label>
                <input type="email" id="loginEmail" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Passwort</label>
                <input type="password" id="loginPassword" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
        </form>

        <!-- Register -->
        <form id="registerForm" class="auth-form" style="display:none">
            <div class="form-row">
                <div class="form-group">
                    <label for="regFirstName">Vorname</label>
                    <input type="text" id="regFirstName" required>
                </div>
                <div class="form-group">
                    <label for="regLastName">Nachname</label>
                    <input type="text" id="regLastName" required>
                </div>
            </div>
            <div class="form-group">
                <label for="regEmail">E-Mail</label>
                <input type="email" id="regEmail" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="regPassword">Passwort (min. 6 Zeichen)</label>
                <input type="password" id="regPassword" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Registrieren</button>
        </form>
    </div>
</div>

<!-- ══════ MAIN VIEW ══════ -->
<div id="mainView" style="display:none">

    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <h1>Platzbuchung</h1>
        </div>
        <div class="header-right">
            <span class="user-name" id="displayName"></span>
            <button class="btn btn-sm btn-outline" id="btnMyBookings">Meine Buchungen</button>
            <button class="btn btn-sm btn-outline" id="btnPassword">Passwort</button>
            <button class="btn btn-sm btn-admin" id="btnAdmin" style="display:none">Admin</button>
            <button class="btn btn-sm" id="btnLogout">Abmelden</button>
        </div>
    </header>

    <!-- Datum-Navigation -->
    <div class="date-nav">
        <button class="btn-icon" id="btnPrevDay">&#9664;</button>
        <div class="date-display" id="dateDisplay">
            <span id="dateText"></span>
            <input type="date" class="date-input" id="datePicker">
        </div>
        <button class="btn-icon" id="btnNextDay">&#9654;</button>
        <button class="btn btn-sm btn-outline" id="btnToday">Heute</button>
        <button class="btn btn-sm btn-outline" id="btnToggleCal">Kalender</button>
    </div>

    <!-- 14-Tage-Kalender -->
    <div class="cal-strip" id="calStrip" style="display:none"></div>

    <!-- Platz-Tabs (Mobile) -->
    <div class="court-tabs" id="courtTabs">
        <button class="court-tab active" data-court="0">Platz 1</button>
        <button class="court-tab" data-court="1">Platz 2</button>
        <button class="court-tab" data-court="2">Platz 3</button>
    </div>

    <!-- Buchungsraster -->
    <div class="grid-wrapper">
        <div class="booking-grid" id="bookingGrid"></div>
    </div>

    <!-- Legende -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot free"></div>Frei</div>
        <div class="legend-item"><div class="legend-dot own"></div>Eigene</div>
        <div class="legend-item"><div class="legend-dot booked"></div>Belegt</div>
        <div class="legend-item"><div class="legend-dot past"></div>Vergangen</div>
    </div>

    <!-- Info -->
    <div class="info-bar">
        Max. 2 Buchungen pro Tag | Buchbar bis 14 Tage im Voraus | Zeitslots: 07:00 - 22:00 Uhr (30 Min.)
    </div>
</div>

<!-- ══════ OVERLAY ══════ -->
<div class="overlay" id="overlay"></div>

<!-- ══════ Panel: Meine Buchungen ══════ -->
<div class="side-panel" id="panelMyBookings">
    <div class="panel-header">
        <h2>Meine Buchungen</h2>
        <button class="btn-close" data-close="panelMyBookings">&times;</button>
    </div>
    <div class="panel-body" id="myBookingsList"></div>
</div>

<!-- ══════ Panel: Passwort aendern ══════ -->
<div class="side-panel" id="panelPassword">
    <div class="panel-header">
        <h2>Passwort aendern</h2>
        <button class="btn-close" data-close="panelPassword">&times;</button>
    </div>
    <div class="panel-body">
        <form id="passwordForm" class="panel-form">
            <div class="form-group">
                <label for="newPassword">Neues Passwort (min. 6 Zeichen)</label>
                <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Passwort bestaetigen</label>
                <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Passwort aendern</button>
        </form>
    </div>
</div>

<!-- ══════ Panel: Admin ══════ -->
<div class="side-panel panel-wide" id="panelAdmin">
    <div class="panel-header">
        <h2>Mitglieder verwalten</h2>
        <button class="btn-close" data-close="panelAdmin">&times;</button>
    </div>
    <div class="panel-body" id="adminUserList"></div>
</div>

<!-- ══════ EmailJS SDK (kostenlos) ══════ -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- ══════ Firebase SDK (compat) ══════ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/app.js"></script>

</body>
</html>
